# Goreleaser config for closient/terraform-provider-stripe (private fork).
#
# Publishes to:
#   - GitHub Releases (source of truth for artifacts)
#   - S3 Network Mirror (consumed by Atlantis + local dev, see release.yml)
#
# Differences from upstream (lukasaron/terraform-provider-stripe):
#   - No GPG signing. The Terraform Network Mirror protocol authenticates via
#     SHA256 hashes in the per-version manifest; signatures are only required
#     by the public Registry. Removing this removes a CI secret + dependency.
#   - Dropped the `arm` goarch — we have no armv6/v7 consumers.

version: 2
before:
  hooks:
    - go mod tidy
builds:
  - env:
      - CGO_ENABLED=0
    mod_timestamp: '{{ .CommitTimestamp }}'
    flags:
      - -trimpath
    ldflags:
      - '-s -w -X main.version={{.Version}} -X main.commit={{.Commit}}'
    goos:
      - freebsd
      - windows
      - linux
      - darwin
    goarch:
      - amd64
      - '386'
      - arm64
    ignore:
      - goos: darwin
        goarch: '386'
    binary: '{{ .ProjectName }}_v{{ .Version }}'
archives:
  - formats: ['zip']
    name_template: '{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}'
checksum:
  extra_files:
    - glob: 'terraform-registry-manifest.json'
      name_template: '{{ .ProjectName }}_{{ .Version }}_manifest.json'
  name_template: '{{ .ProjectName }}_{{ .Version }}_SHA256SUMS'
  algorithm: sha256
release:
  extra_files:
    - glob: 'terraform-registry-manifest.json'
      name_template: '{{ .ProjectName }}_{{ .Version }}_manifest.json'
changelog:
  disable: true
